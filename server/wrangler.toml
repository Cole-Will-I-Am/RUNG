name = "rung-api"
main = "src/index.js"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# RUNG competitive backend: server-authoritative scoring + leaderboards on D1.
[[d1_databases]]
binding = "DB"
database_name = "rung-arena"
database_id = "2039274d-9498-4cd8-a5c8-4adcb2dafb93"

# Production endpoint the iOS app talks to (custom domain in the manticthink.com zone,
# auto-provisioned on deploy like db8/logos). Session-signing key set via:
#   wrangler secret put SESSION_SECRET
[[routes]]
pattern = "rung-api.manticthink.com"
custom_domain = true
