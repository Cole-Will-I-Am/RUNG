name: RUNG
options:
  bundleIdPrefix: com.colecantcode
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: true
    # Bump MARKETING_VERSION on EVERY TestFlight build (not just the build number,
    # which CI sets to the GitHub run number at archive time).
    MARKETING_VERSION: "1.1.2"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: B3DB33R8JN

targets:
  RUNG:
    type: application
    platform: iOS
    sources:
      - RUNG/Sources
      - RUNG/Resources
      - RUNG/Assets.xcassets
    # Sign in with Apple (optional account upgrade for the leaderboard).
    entitlements:
      path: RUNG/RUNG.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colecantcode.rung
        INFOPLIST_KEY_CFBundleDisplayName: RUNG
        INFOPLIST_KEY_CFBundleName: RUNG
        # Beta upload shortcut: the app ships no non-exempt encryption.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        # iPhone-only (TARGETED_DEVICE_FAMILY = 1 below), portrait only.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_NAME: RUNG
        # iPhone-only (1) so iPad screenshots aren't required for submission.
        TARGETED_DEVICE_FAMILY: "1"
        # Module name is fixed so tests can `@testable import RUNG`.
        PRODUCT_MODULE_NAME: RUNG
        # Modern identity name; without this XcodeGen emits the legacy default.
        CODE_SIGN_IDENTITY: "Apple Development"
    scheme:
      testTargets:
        - RUNGTests

  RUNGTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RUNG/Tests
    dependencies:
      - target: RUNG
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colecantcode.rung.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/RUNG.app/RUNG"
